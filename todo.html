<!DOCTYPE html>
<html>
<head>
    <title>To-Do List App</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input {
            width: 75%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            padding: 10px;
            border: none;
            background: #2575fc;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1b5fd9;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        li {
            background: #f2f2f2;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        .delete {
            background: red;
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>My To-Do List</h2>

    <input id="taskInput" placeholder="Write task...">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>

</div>

<script>
    function addTask() {
        let input = document.getElementById("taskInput");
        let task = input.value;

        if (task === "") {
            alert("Please write a task!");
            return;
        }

        let li = document.createElement("li");
        li.innerHTML = task + ' <button class="delete" onclick="this.parentElement.remove()">X</button>';

        document.getElementById("taskList").appendChild(li);

        input.value = "";
    }
</script>

</body>
</html>
